<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shuki - macOS 會議錄製與 AI 分析</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      text-align: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline {
      font-size: 18px;
      color: #a3a3a3;
      margin-bottom: 32px;
    }
    .download-btn {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .download-btn:hover { opacity: 0.9; }
    .note {
      margin-top: 16px;
      font-size: 13px;
      color: #737373;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Shuki</h1>
    <p class="tagline">macOS 會議錄製、轉錄與 AI 分析</p>
    <a class="download-btn" href="https://github.com/zxc123456616/shuki-releases/releases/latest">Download Latest</a>
    <p class="note">Requires macOS 14.0 or later</p>
  </div>
</body>
</html>
